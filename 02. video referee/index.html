ound"><line x1="75" y1="12" x2="75" y2="42"/><line x1="63" y1="27" x2="87" y2="27"/></g><g class="dpad-icon dpad-icon-down" stroke="rgba(0,0,0,0.4)" stroke-width="2.5" stroke-linecap="round"><line x1="67" y1="122" x2="83" y2="122"/></g></svg> <button type="button" class="dpad-zone dpad-up" id="volUp" aria-label="배속 빠르게" title="배속 빠르게" disabled="disabled"></button> <button type="button" class="dpad-zone dpad-left" id="padPrev" aria-label="이전" title="이전" disabled="disabled"></button> <button type="button" class="dpad-zone dpad-right" id="padNextDpad" aria-label="다음" title="다음" disabled="disabled"></button> <button type="button" class="dpad-zone dpad-down" id="volDown" aria-label="배속 늦추기" title="배속 늦추기" disabled="disabled"></button></div><div class="pd-action-grid" aria-label="기기 단축 버튼"><button type="button" id="btnHome" class="pad pd-round-btn pd-list-btn" aria-label="홈" title="홈"><svg class="tp-home-icon" viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.75V20a1 1 0 0 0 1 1h4v-6h4v6h4a1 1 0 0 0 1-1V9.75"/></svg></button> <button type="button" class="pad pd-round-btn pd-menu-btn" id="btnSettings" aria-label="설정" title="설정">M</button> <button type="button" class="pad pd-round-btn play-symbol" id="padPlay" aria-label="듣기" disabled="disabled">▶</button><div class="pd-record-cell"><div id="pronounceRecProgress" class="pronounce-rec-progress-slot pronounce-rec-progress-in-device" aria-live="polite"></div><button type="button" class="pad pd-round-btn pd-record-btn" id="recordBtn" aria-label="발음 녹음" disabled="disabled">●</button></div></div></div></div><button type="button" id="btnGrade" class="sr-only" disabled="disabled" tabindex="-1" aria-hidden="true">Check</button><div class="pd-usb" aria-hidden="true"></div><div class="disc" id="disc" hidden aria-hidden="true"><div class="hub"></div></div></div></section></main></section></div><script type="module">let baseTitle = document.querySelector('#pageTitle')?.textContent?.trim() || 'YouTube 자막 학습';

        const LS_DISPLAY_THEME = 'learnlang_display_theme';
        const LS_THEME_DARK = 'learnlang_theme_dark';

        const settingsModal = document.querySelector('#tpSettingsModal');
        const settingsScreen = settingsModal?.closest('.screen');
        const btnHome = document.querySelector('#btnHome');
        const totalCnt = document.querySelector('#totalCnt');

        function escapeHTML(s = '') {
            return s.replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
        }

        function updateHubPageTitle(subtitle) {
            const h1 = document.querySelector('#pageTitle');
            if (!h1) return;
            const sub = subtitle && String(subtitle).trim() ? subtitle : '\u00a0';
            h1.innerHTML = `<span class="page-title-base">${escapeHTML(baseTitle)}</span><br><span class="page-title-csv">${escapeHTML(sub)}</span>`;
        }

        async function initTitle() {
            try {
                const res = await fetch('../title.txt', { cache: 'no-store' });
                if (res.ok) {
                    const title = (await res.text()).trim();
                    if (title) {
                        baseTitle = title;
                        document.title = title;
                    }
                }
            } catch (_) {}
        }

        function applyDisplayTheme(mode) {
            const theme = mode === 'dark' || mode === 'mint' ? mode : 'light';
            document.body.classList.remove('dark', 'pd-display-light', 'pd-display-mint');
            if (theme === 'dark') document.body.classList.add('pd-display-light', 'dark');
            else if (theme === 'mint') document.body.classList.add('pd-display-mint');
            else document.body.classList.add('pd-display-light');
            try {
                localStorage.setItem(LS_DISPLAY_THEME, theme);
                localStorage.setItem(LS_THEME_DARK, theme === 'dark' ? '1' : '0');
            } catch (_) {}
        }

        function readStoredDisplayThemeMode() {
            try {
                const saved = localStorage.getItem(LS_DISPLAY_THEME);
                if (saved === 'dark' || saved === 'mint' || saved === 'light') return saved;
                if (localStorage.getItem(LS_THEME_DARK) === '1') return 'dark';
            } catch (_) {}
            return 'light';
        }

        function loadThemeFromStorage() {
            const mode = readStoredDisplayThemeMode();
            document.querySelectorAll('input[name="displayTheme"]').forEach((el) => {
                el.checked = el.value === mode;
            });
            applyDisplayTheme(mode);
        }

        function openSettings(e) {
            e?.stopPropagation();
            if (!settingsModal) return;
            settingsModal.classList.remove('hidden');
            settingsModal.hidden = false;
            settingsScreen?.classList.add('pd-settings-open');
            document.querySelector('#btnApplySettings')?.focus();
        }

        function closeSettings() {
            if (!settingsModal) return;
            settingsModal.classList.add('hidden');
            settingsModal.hidden = true;
            settingsScreen?.classList.remove('pd-settings-open');
        }

        function initSettingsModal() {
            document.querySelector('#btnSettings')?.addEventListener('click', openSettings);
            document.querySelector('#btnApplySettings')?.addEventListener('click', () => {
                const theme = document.querySelector('input[name="displayTheme"]:checked')?.value || 'light';
                applyDisplayTheme(theme);
                closeSettings();
            });
            settingsModal?.querySelector('[data-close-settings]')?.addEventListener('click', closeSettings);
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' && settingsModal && !settingsModal.hidden) closeSettings();
            });
        }

        function studyUrl(item) {
            const u = new URL('./study_youtube.html', location.href);
            u.searchParams.set('srt', item.path);
            if (item.youtube) u.searchParams.set('url', item.youtube);
            return u.pathname + u.search;
        }

        btnHome?.addEventListener('click', () => {
            location.href = '../index.html';
        });

        await initTitle();
        updateHubPageTitle('\u00a0');
        loadThemeFromStorage();
        initSettingsModal();

        (async function initCatalog() {
            const list = document.querySelector('#list');
            const empty = document.querySelector('#empty');
            const q = document.querySelector('#q');

            let data = [];
            try {
                const res = await fetch('./catalog.json', { cache: 'no-store' });
                data = await res.json();
                if (totalCnt) totalCnt.textContent = String(data.length);
            } catch (_) {
                list.innerHTML = '<p class="pd-index-msg">catalog.json을 불러오지 못했습니다.</p>';
                return;
            }

            function groupByDir(arr) {
                const map = new Map();
                for (const it of arr) {
                    const key = it.dir || '';
                    if (!map.has(key)) map.set(key, []);
                    map.get(key).push(it);
                }
                for (const [, v] of map) v.sort((a, b) => a.name.localeCompare(b.name));
                return Array.from(map.entries()).sort((a, b) => a[0].localeCompare(b[0]));
            }

            let view = data.slice();

            function render(arr) {
                if (!arr.length) {
                    list.innerHTML = '';
                    empty.hidden = false;
                    return;
                }
                empty.hidden = true;

                const groups = groupByDir(arr);
                const frag = document.createDocumentFragment();

                for (const [dir, files] of groups) {
                    const section = document.createElement('section');
                    section.className = 'pd-index-folder';
                    if (dir) {
                        const title = document.createElement('div');
                        title.className = 'pd-index-folder-title';
                        title.textContent = dir;
                        section.appendChild(title);
                    }

                    const ul = document.createElement('ul');
                    ul.className = 'pd-index-items';

                    for (const f of files) {
                        const li = document.createElement('li');
                        const display = f.name.replace(/\.srt$/i, '');
                        const a = document.createElement('a');
                        a.href = studyUrl(f);
                        a.className = 'pd-index-link';
                        a.textContent = display;
                        li.appendChild(a);
                        ul.appendChild(li);
                    }
                    section.appendChild(ul);
                    frag.appendChild(section);
                }

                list.innerHTML = '';
                list.appendChild(frag);
            }

            render(view);

            q?.addEventListener('input', () => {
                const term = q.value.trim().toLowerCase();
                view = data.filter((it) => {
                    const hay = ((it.dir || '') + '/' + it.name).toLowerCase();
                    return hay.includes(term);
                });
                render(view);
            });
        })();</script></body></html>
