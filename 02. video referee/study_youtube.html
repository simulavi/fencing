"round"><path d="M17 2.1l4 4-4 4"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M7 21.9l-4-4 4-4"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/></svg></span></button> <button id="btnAnsLeft" type="button" class="pad pd-round-btn pd-yt-quiz-btn" data-answer="left" disabled="disabled">Left</button> <button id="btnAnsNon" type="button" class="pad pd-round-btn pd-yt-quiz-btn" data-answer="non" disabled="disabled">Non</button> <button id="btnAnsRight" type="button" class="pad pd-round-btn pd-yt-quiz-btn" data-answer="right" disabled="disabled">Right</button></div></div></div><div class="pd-usb" aria-hidden="true"></div></div></section></main></section></div><script type="module">let baseTitle = document.querySelector('#pageTitle')?.textContent?.trim() || 'YouTube 자막 학습';

        const LS_DISPLAY_THEME = 'learnlang_display_theme';
        const LS_THEME_DARK = 'learnlang_theme_dark';

        function escapeHTML(s = '') {
            return s.replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
        }

        function srtLabelFromPath(path) {
            if (!path) return '';
            const base = decodeURIComponent(String(path)).split('/').pop() || '';
            return base.replace(/\.srt$/i, '');
        }

        function updateHubPageTitle(subtitle) {
            const h1 = document.querySelector('#pageTitle');
            if (!h1) return;
            const sub = subtitle && String(subtitle).trim() ? subtitle : '\u00a0';
            h1.innerHTML = `<span class="page-title-base">${escapeHTML(baseTitle)}</span><br><span class="page-title-csv">${escapeHTML(sub)}</span>`;
        }

        window.updateHubPageTitle = updateHubPageTitle;

        async function initTitle() {
            try {
                const res = await fetch('../title.txt', { cache: 'no-store' });
                if (res.ok) {
                    const title = (await res.text()).trim();
                    if (title) {
                        baseTitle = title;
                        document.title = title;
                    }
                }
            } catch (_) {}
        }

        function applyDisplayTheme(mode) {
            const theme = mode === 'dark' || mode === 'mint' ? mode : 'light';
            document.body.classList.remove('dark', 'pd-display-light', 'pd-display-mint');
            if (theme === 'dark') document.body.classList.add('pd-display-light', 'dark');
            else if (theme === 'mint') document.body.classList.add('pd-display-mint');
            else document.body.classList.add('pd-display-light');
            try {
                localStorage.setItem(LS_DISPLAY_THEME, theme);
                localStorage.setItem(LS_THEME_DARK, theme === 'dark' ? '1' : '0');
            } catch (_) {}
        }

        function loadThemeFromStorage() {
            try {
                const saved = localStorage.getItem(LS_DISPLAY_THEME);
                const mode = saved === 'dark' || saved === 'mint' || saved === 'light'
                    ? saved
                    : (localStorage.getItem(LS_THEME_DARK) === '1' ? 'dark' : 'light');
                document.querySelectorAll('input[name="displayTheme"]').forEach((el) => {
                    el.checked = el.value === mode;
                });
                applyDisplayTheme(mode);
            } catch (_) {}
        }

        function bindRoundPress(btn) {
            if (!btn) return;
            const press = () => btn.classList.add('pressed');
            const release = () => btn.classList.remove('pressed');
            btn.addEventListener('pointerdown', (e) => {
                if (e.pointerType === 'mouse' && e.button !== 0) return;
                try { btn.setPointerCapture(e.pointerId); } catch (_) {}
                press();
            });
            btn.addEventListener('pointerup', release);
            btn.addEventListener('pointercancel', release);
            btn.addEventListener('lostpointercapture', release);
        }

        document.querySelectorAll('.pd-yt-btn-cluster .pd-round-btn').forEach(bindRoundPress);

        const settingsModal = document.querySelector('#tpSettingsModal');
        const settingsScreen = settingsModal?.closest('.screen');

        function openSettings(e) {
            e?.stopPropagation();
            if (!settingsModal) return;
            settingsModal.classList.remove('hidden');
            settingsModal.hidden = false;
            settingsScreen?.classList.add('pd-settings-open');
        }

        function closeSettings() {
            if (!settingsModal) return;
            settingsModal.classList.add('hidden');
            settingsModal.hidden = true;
            settingsScreen?.classList.remove('pd-settings-open');
        }

        document.querySelector('#btnSettings')?.addEventListener('click', openSettings);
        document.querySelector('#btnApplySettings')?.addEventListener('click', () => {
            const theme = document.querySelector('input[name="displayTheme"]:checked')?.value || 'light';
            applyDisplayTheme(theme);
            closeSettings();
        });
        settingsModal?.querySelector('[data-close-settings]')?.addEventListener('click', closeSettings);
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && settingsModal && !settingsModal.hidden) closeSettings();
        });

        document.querySelector('#btnHome')?.addEventListener('click', () => {
            location.href = './index.html';
        });

        await initTitle();
        const srtParam = new URLSearchParams(location.search).get('srt');
        updateHubPageTitle(srtLabelFromPath(srtParam) || '\u00a0');
        loadThemeFromStorage();</script><script src="app.js"></script></body></html>
